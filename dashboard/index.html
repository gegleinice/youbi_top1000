<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Creator 1000 Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>

    <main class="container">
      <header class="hero card">
        <p class="eyebrow">TikTok Creator Intelligence</p>
        <h1>Top1000 达人数据看板</h1>
        <p class="sub">
          数据来自分页 API 抓取；支持搜索、筛选、排序与榜单浏览。视觉风格参考 Taste
          Skill 的简洁高级感。
        </p>
        <div class="meta-row">
          <span id="metaGeneratedAt">生成时间 -</span>
          <span id="metaStopReason">状态 -</span>
          <span id="metaCount">记录数 -</span>
        </div>
      </header>

      <section class="stats-grid">
        <article class="stat card">
          <p class="label">达人数</p>
          <p class="value" id="statCreators">-</p>
        </article>
        <article class="stat card">
          <p class="label">粉丝总量</p>
          <p class="value" id="statFollowersTotal">-</p>
        </article>
        <article class="stat card">
          <p class="label">粉丝中位数</p>
          <p class="value" id="statFollowersMedian">-</p>
        </article>
        <article class="stat card">
          <p class="label">点赞均值</p>
          <p class="value" id="statLikesAvg">-</p>
        </article>
      </section>

      <section class="card controls">
        <div class="control">
          <label for="searchInput">搜索用户名 / 昵称</label>
          <input id="searchInput" type="text" placeholder="例如 mrbeast" />
        </div>
        <div class="control">
          <label for="minFollowers">最小粉丝数</label>
          <input id="minFollowers" type="number" min="0" step="100000" value="0" />
        </div>
        <div class="control">
          <label for="sortBy">排序方式</label>
          <select id="sortBy">
            <option value="rank_followers_asc">粉丝排名（升序）</option>
            <option value="followers_desc">粉丝数（降序）</option>
            <option value="likes_desc">点赞数（降序）</option>
            <option value="uploads_desc">作品数（降序）</option>
          </select>
        </div>
      </section>

      <section class="grid-2">
        <article class="card">
          <h2>粉丝 Top10</h2>
          <div id="followersChart" class="bar-list"></div>
        </article>
        <article class="card">
          <h2>点赞 Top10</h2>
          <div id="likesChart" class="bar-list"></div>
        </article>
      </section>

      <section class="card table-card">
        <div class="table-header">
          <h2>达人列表</h2>
          <p id="resultCount">0 条</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>粉丝排名</th>
                <th>账号</th>
                <th>昵称</th>
                <th>粉丝数</th>
                <th>点赞数</th>
                <th>作品数</th>
                <th>关注数</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
